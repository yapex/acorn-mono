name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check . --config pyproject.toml --ignore E501 --ignore W293 --ignore W292 --ignore F841 --ignore E402

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Type check acorn
        run: uv run pyright acorn-core/src acorn-agent/src

      - name: Type check vi plugins
        run: uv run pyright value-investment/vi_core/src value-investment/vi_fields_ifrs/src value-investment/vi_fields_extension/src

  test-acorn:
    name: Test Acorn
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Install examples-plugin
        run: uv pip install -e examples-plugin/

      - name: Test
        run: uv run pytest acorn-core/tests -v

  test-vi-plugins:
    name: Test VI Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install vi-core
        run: uv pip install -e value-investment/vi_core

      - name: Install vi-fields-ifrs
        run: uv pip install -e value-investment/vi_fields_ifrs

      - name: Install vi-fields-extension
        run: uv pip install -e value-investment/vi_fields_extension
