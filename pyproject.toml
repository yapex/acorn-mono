[tool.uv]
workspace = { members = ["acorn-core", "acorn-agent", "acorn-events", "acorn-cli", "examples-plugin", "value-investment-plugin/vi_core", "value-investment-plugin/vi_fields_extension", "value-investment-plugin/vi_plugin"] }

[tool.uv.sources]
acorn-core = { workspace = true }
acorn-agent = { workspace = true }
acorn-events = { workspace = true }
acorn-cli = { workspace = true }
examples-plugin = { workspace = true }
vi-core = { workspace = true }
vi-fields-extension = { workspace = true }
vi-plugin = { workspace = true }

[tool.poe.tasks]
start = "bash start-agent.sh"
stop = "bash stop-agent.sh"

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "ruff>=0.9.0",
    "pyright>=1.1.0",
    "pytest>=9.0.2",
]
