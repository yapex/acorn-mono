[tool.uv]
workspace = { members = [
    "acorn-core",
    "acorn-events",
    "acorn-cli",
    "examples-plugin",
    "value-investment/vi_cli",
    "value-investment/vi_core",
    "value-investment/vi_fields_extension",
    "value-investment/vi_calculators",
    "value-investment/vi_fields_ifrs",
    "value-investment/provider_market_a",
    "value-investment/provider_market_hk",
    "value-investment/provider_market_us",
] }

[tool.uv.sources]
acorn-core = { workspace = true }
acorn-events = { workspace = true }
acorn-cli = { workspace = true }
examples-plugin = { workspace = true }
vi-core = { workspace = true }
vi-fields-extension = { workspace = true }
vi-calculators = { workspace = true }
vi-fields-ifrs = { workspace = true }
provider-market-a = { workspace = true }
provider-market-hk = { workspace = true }
provider-market-us = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",
    "E722",
    "E402",
    "W293",
    "W292",
    "F841",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "E402"]
"tests/*" = ["E501", "F401", "E402"]

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "ruff>=0.9.0",
    "pyright>=1.1.0",
    "pytest>=9.0.2",
]
