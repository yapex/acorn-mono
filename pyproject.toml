[tool.uv]
workspace = { members = ["acorn-core", "acorn-agent", "acorn-events"] }

[tool.uv.sources]
acorn-core = { workspace = true }
acorn-agent = { workspace = true }
acorn-events = { workspace = true }

[tool.poe.tasks]
start = "bash start-agent.sh"
stop = "bash stop-agent.sh"

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "ruff>=0.9.0",
    "pyright>=1.1.0",
]
